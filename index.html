<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>菠萝玛特 Prompt Mart</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#2F4F4F"> <style>
        :root {
            --primary-bg: #2F4F4F; /* 深雾霾 */
            --accent-color: #8FBC8F; /* 青瓷绿 */
            --text-light: #E0E0E0;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        body {
            margin: 0; padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--primary-bg);
            color: var(--text-light);
            min-height: 100vh;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* 毛玻璃登录框 */
        .auth-container {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 2rem;
            width: 85%; max-width: 340px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
        }

        .auth-container h1 { color: var(--accent-color); margin-top: 0; font-size: 1.5rem; }
        .auth-container p { font-size: 0.9rem; margin-bottom: 1.5rem; opacity: 0.8; }

        input[type="text"] {
            width: 100%; padding: 12px; margin-bottom: 1rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--glass-border);
            border-radius: 8px; color: white;
            font-size: 1rem; box-sizing: border-box; text-align: center; outline: none;
        }
        input[type="text"]:focus { border-color: var(--accent-color); }

        button {
            width: 100%; padding: 12px;
            background: var(--accent-color); color: #1a1a1a;
            border: none; border-radius: 8px;
            font-size: 1rem; font-weight: bold; cursor: pointer;
        }

        #msg { margin-top: 1rem; font-size: 0.85rem; height: 1.2rem; }

        /* 验证后的内容展示区 */
        #main-content {
            display: none;
            width: 100%; max-width: 800px;
            padding: 20px; box-sizing: border-box;
            background: white; color: #333;
            min-height: 100vh;
        }
    </style>
</head>
<body>

    <div class="auth-container" id="authBox">
        <h1>🍍 菠萝玛特</h1>
        <p>专业 AI 提示词矩阵</p>
        <input type="text" id="licenseInput" placeholder="请输入授权码" autocomplete="off">
        <button onclick="verifyAndLoad()">验证并加载</button>
        <div id="msg"></div>
    </div>

    <div id="main-content"></div>

    <script>
        async function verifyAndLoad() {
            const key = document.getElementById('licenseInput').value.trim();
            const msg = document.getElementById('msg');
            const authBox = document.getElementById('authBox');
            const mainContent = document.getElementById('main-content');
            
            if (!key) { msg.style.color = "#ff6b6b"; msg.innerText = "请输入授权码"; return; }

            msg.style.color = "var(--text-light)";
            msg.innerText = "云端安全验证中...";

            try {
                // 注意：这里已经请求你的新域名 api.boluomate.com 了
                const response = await fetch('https://api.boluomate.com', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ key: key })
                });

                const result = await response.json();

                if (result.status === 'success') {
                    // 隐藏外壳，显示内容区
                    authBox.style.display = 'none';
                    document.body.style.justifyContent = 'flex-start';
                    document.body.style.background = '#f4f4f4'; 
                    mainContent.style.display = 'block';
                    
                    // 将 KV 里的提示词矩阵注入页面
                    mainContent.innerHTML = result.data;
                } else {
                    msg.style.color = "#ff6b6b";
                    msg.innerText = result.message;
                }
            } catch (error) {
                msg.style.color = "#ff6b6b";
                msg.innerText = "网络异常，请检查接口配置";
            }
        }
        
        // PWA 注册
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('/sw.js');
        }
    </script>
</body>
</html>
